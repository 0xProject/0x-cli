name: Release

# Cuts a cross-platform release. Push a version tag (e.g. `v0.1.0`) and this
# builds the `0x` binary for five targets, attaches them to a GitHub Release,
# and leaves it as a **draft** for you to review and publish.
#
# The Amplitude telemetry key is injected here from the `ZEROEX_AMPLITUDE_API_KEY`
# repo secret via `option_env!` at compile time — so only released binaries can
# send telemetry; source builds never have a key. If the secret is unset, the
# build still succeeds and telemetry stays inert.
on:
  push:
    tags:
      - "v*"
  # Manual dry-runs: build the artifacts without pushing a real tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/name for the draft release (e.g. v0.0.0-test)"
        required: true

permissions:
  contents: write # create the release and upload assets

# Disable HTTP/2 multiplexing for cargo's crates.io fetches — works around the
# intermittent "Error in the HTTP2 framing layer" curl failures on macOS
# runners — and retry transient network errors.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 → glibc 2.35, broad compatibility with older distros.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
          # macos-15-intel is the last supported x86_64 macOS image (macos-13
          # is being retired); macos-15 is Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Vendored OpenSSL (pulled in transitively by solana-sdk) builds from
      # source. On Windows that needs NASM and a full Perl — the runner ships
      # both, but the build runs under Git-Bash whose stripped-down Perl can't
      # run OpenSSL's Configure, so point the build at the preinstalled
      # Strawberry Perl explicitly.
      - name: Set up NASM (Windows, for vendored OpenSSL)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Use Strawberry Perl for OpenSSL (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "OPENSSL_SRC_PERL=C:/Strawberry/perl/bin/perl.exe" >> "$GITHUB_ENV"

      - name: Build release binary
        shell: bash
        env:
          # Compiled into the binary via option_env!. Absent secret → inert build.
          ZEROEX_AMPLITUDE_API_KEY: ${{ secrets.ZEROEX_AMPLITUDE_API_KEY }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          bin=0x
          name="0x-${{ matrix.target }}"
          mkdir "$name"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/$bin.exe" "$name/"
          else
            cp "target/${{ matrix.target }}/release/$bin" "$name/"
          fi
          # Bundle docs when present (LICENSE may not exist yet — don't fail).
          cp README.md "$name/" 2>/dev/null || true
          cp LICENSE* "$name/" 2>/dev/null || true

          if [ "${{ runner.os }}" = "Windows" ]; then
            asset="$name.zip"
            7z a "$asset" "$name" >/dev/null
          else
            asset="$name.tar.gz"
            tar czf "$asset" "$name"
          fi

          # Checksum (shasum on macOS, sha256sum elsewhere incl. git-bash).
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi

          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload to draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
